[pytest]
# `pythonpath = .` puts the repo root on sys.path so Home Assistant's loader
# can `import custom_components` and discover custom_components/tiktoktts.
pythonpath = .
testpaths = tests
asyncio_mode = auto
# Treat the integration's own warnings as errors would be too strict given
# HA's deprecation churn, so we only surface them.
filterwarnings =
    ignore::DeprecationWarning
addopts = -q
