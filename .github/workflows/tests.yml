name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # HA 2026.3+ (pinned by pytest-homeassistant-custom-component) requires
        # Python 3.14, so the test environment must run on 3.14.
        python-version: ["3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Run pytest
        run: pytest --cov=custom_components.tiktoktts --cov-report=term-missing
