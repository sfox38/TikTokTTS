name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Run daily so we catch breakage from Home Assistant / HACS changes even
    # when the repo itself hasn't changed.
    - cron: "30 4 * * *"

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
          # The HACS brands check verifies the domain exists in the central
          # home-assistant/brands repo. This integration instead ships its own
          # images in custom_components/tiktoktts/brand/, which Home Assistant
          # serves via the brands proxy API (HA 2026.3+), so a central-repo
          # submission isn't required for custom-repo installs. Drop this ignore
          # if you later add the domain to home-assistant/brands.
          ignore: brands
